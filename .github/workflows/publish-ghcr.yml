name: Publish imsa_tui image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wandabastyle/imsa_tui

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:${{ github.sha }}"

  smoke-pull-latest:
    name: Smoke pull latest image
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Pull Docker image via Compose
        run: docker compose pull

      - name: Start Compose stack
        run: docker compose up -d

      - name: Probe /healthz
        run: |
          for attempt in {1..20}; do
            body="$(curl -fsS http://127.0.0.1:18080/healthz | tr -d '\r\n' || true)"
            if [ "$body" = "ok" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "healthz probe failed"
          docker compose ps
          docker compose logs imsa-web
          exit 1

      - name: Compose status
        if: always()
        run: docker compose ps

      - name: Compose logs
        if: always()
        run: docker compose logs imsa-web

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
