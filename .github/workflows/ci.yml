name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: cargo test
        run: cargo test --no-default-features

  web-checks:
    name: Web verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: pnpm run verify
        run: pnpm run verify
        working-directory: web

  integration-embed-ui:
    name: Integration embed-ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build web assets
        run: pnpm run build
        working-directory: web

      - name: cargo check --all-targets --all-features
        run: cargo check --all-targets --all-features

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image via Compose
        run: docker compose build

      - name: Start Compose stack
        run: docker compose up -d

      - name: Probe /healthz
        run: |
          for attempt in {1..20}; do
            body="$(curl -fsS http://127.0.0.1:18080/healthz | tr -d '\r\n' || true)"
            if [ "$body" = "ok" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "healthz probe failed"
          docker compose ps
          docker compose logs imsa-web
          exit 1

      - name: Compose status
        if: always()
        run: docker compose ps

      - name: Compose logs
        if: always()
        run: docker compose logs imsa-web

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
