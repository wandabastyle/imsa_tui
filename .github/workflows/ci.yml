name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - 'web/**'
              - 'crates/webui/**'
              - 'crates/web-shared/**'
              - 'src/web/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            docker:
              - 'compose.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/publish-ghcr.yml'
              - 'README.md'

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-native

      - name: No Rust changes
        if: needs.changes.outputs.rust != 'true'
        run: echo "No Rust-relevant changes; skipping Rust checks."

      - name: cargo fmt --check
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt --check

      - name: cargo clippy
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: cargo test
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --no-default-features

  web-checks:
    name: Web (Yew/Trunk)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-wasm

      - name: No web changes
        if: needs.changes.outputs.web != 'true'
        run: echo "No web-relevant changes; skipping web checks."

      - name: Install Trunk
        if: needs.changes.outputs.web == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: cargo check -p webui --target wasm32-unknown-unknown
        if: needs.changes.outputs.web == 'true'
        run: cargo check -p webui --target wasm32-unknown-unknown

      - name: trunk build --release
        if: needs.changes.outputs.web == 'true'
        run: trunk build --release --config web/Trunk.toml

      - name: Upload web/build artifact
        if: needs.changes.outputs.web == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build
          retention-days: 1
          compression-level: 1

  integration-embed-ui:
    name: Integration embed-ui
    runs-on: ubuntu-latest
    needs: [changes, web-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: No integration-relevant changes
        if: needs.changes.outputs.rust != 'true' && needs.changes.outputs.web != 'true'
        run: echo "No Rust/Web changes; skipping integration embed-ui check."

      - name: Download web/build artifact
        if: needs.changes.outputs.web == 'true'
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-integration

      - name: cargo check --all-targets --all-features
        if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true'
        run: cargo check --all-targets --all-features

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.docker == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull Docker image via Compose
        run: docker compose pull

      - name: Start Compose stack
        run: docker compose up -d

      - name: Probe /healthz
        run: |
          for attempt in {1..20}; do
            body="$(curl -fsS http://127.0.0.1:18080/healthz | tr -d '\r\n' || true)"
            if [ "$body" = "ok" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "healthz probe failed"
          docker compose ps
          docker compose logs imsa-web
          exit 1

      - name: Compose status
        if: always()
        run: docker compose ps

      - name: Compose logs
        if: always()
        run: docker compose logs imsa-web

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
