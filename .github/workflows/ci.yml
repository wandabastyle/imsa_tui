name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: cargo test
        run: cargo test --no-default-features

  web-checks:
    name: Web (Yew/Trunk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: cargo check -p webui --target wasm32-unknown-unknown
        run: cargo check -p webui --target wasm32-unknown-unknown

      - name: trunk build --release
        run: trunk build --release --config web/Trunk.toml

  integration-embed-ui:
    name: Integration embed-ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build web assets
        run: trunk build --release --config web/Trunk.toml

      - name: cargo check --all-targets --all-features
        run: cargo check --all-targets --all-features

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image via Compose
        run: docker compose build

      - name: Start Compose stack
        run: docker compose up -d

      - name: Probe /healthz
        run: |
          for attempt in {1..20}; do
            body="$(curl -fsS http://127.0.0.1:18080/healthz | tr -d '\r\n' || true)"
            if [ "$body" = "ok" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "healthz probe failed"
          docker compose ps
          docker compose logs imsa-web
          exit 1

      - name: Compose status
        if: always()
        run: docker compose ps

      - name: Compose logs
        if: always()
        run: docker compose logs imsa-web

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
