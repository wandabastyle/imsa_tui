[package]
name = "imsa_tui"
version = "0.1.0"
edition = "2021"

[dependencies]
crossterm = "0.27"
ratatui = "0.26"
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls", "gzip", "brotli", "deflate"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
