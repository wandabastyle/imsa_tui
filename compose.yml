services:
  imsa-web-data-perms:
    image: busybox:1.36
    container_name: imsa-web-data-perms
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /data && chown -R 65532:65532 /data"]
    volumes:
      - imsa-web-data:/data
    restart: "no"

  imsa-web:
    image: ghcr.io/wandabastyle/imsa_tui:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: imsa-web
    restart: unless-stopped
    depends_on:
      imsa-web-data-perms:
        condition: service_completed_successfully
    user: "65532:65532"
    ports:
      - "18080:8080"
    environment:
      WEBUI_AUTO_FUNNEL: "0"
      WEBUI_COOKIE_SECURE: "1"
      BIND_ADDR: "0.0.0.0"
      PORT: "8080"
      XDG_DATA_HOME: "/data"
    volumes:
      - imsa-web-data:/data
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true

volumes:
  imsa-web-data:
